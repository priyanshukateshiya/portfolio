<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Profile avatar">
  <defs>
    <radialGradient id="bg" cx="32%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#b49bff"/>
      <stop offset="55%" stop-color="#6a42ff"/>
      <stop offset="100%" stop-color="#0b0626"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="72" fill="url(#bg)"/>
  <circle cx="150" cy="130" r="120" fill="url(#shine)" opacity=".35" filter="url(#soft)"/>

  <!-- Head -->
  <circle cx="256" cy="214" r="78" fill="rgba(255,255,255,.92)"/>
  <!-- Body -->
  <path
    d="M116 430c18-84 84-136 140-136h0c56 0 122 52 140 136"
    fill="rgba(255,255,255,.92)"
    stroke="rgba(255,255,255,.92)"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="48"
  />
</svg>
